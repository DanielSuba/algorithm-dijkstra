<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizualizacja Algorytmu Dijkstra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="titles">
    <h2>Wizualizacja Algorytmu Dijkstra</h2>
    </div>
    <!-- Sterowniki 1-->
    <div class="controls">
    <label>Height: <input id="row" type="number" value="10" min="1" max="50"></label>
    <label>Length: <input id="col" type="number" value="10" min="1" max="50"></label>
    <button id="generate" >Generate</button>
    <button id="ramdomize" >Ramdomize walls</button>
    </div>
  <table>

  <div class="slidecontainer">
    <tr>
    <th>Speed: <output id="speedVal" type="number" value="0" min="1"></output></th>
    <th><input type="range" min="1" max="500" value="100" class="slider" id="speed"></th>
    </tr>
  </table>
  </div>

  <div class="controls">
    <button id="start" >Start</button>
    <button id="stop" >Stop</button>
    <button id="reset" >Reset</button>
    </div>

    </div>
    <div id="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
