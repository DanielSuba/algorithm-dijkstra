<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizualizacja Algorytmu Dijkstra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Wizualizacja Pathfinding - Siatka</h2>
    <p>Kliknij na komórkę, aby dodać/usunąć ścianę.</p>
    <!-- Sterowniki 1-->
    <div class="controls">
    <label>Count: <input id="count" type="number" value="30" min="1" max="500"></label>
    <label>Min: <input id="min" type="number" value="10" min="0"></label>
    <label>Max: <input id="max" type="number" value="100" min="1"></label>
    <button id="gener" >Generate</button>
    
    <button id="sorta" >Sort</button>
    </div>
    <div id="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
