<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizualizacja Algorytmu Dijkstra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="titles">
    <h2>Wizualizacja Algorytmu Dijkstra</h2>
    </div>
    <!-- Sterowniki 1-->
    <div class="controls">
    <label>Height: <input id="row" type="number" value="10" min="1" max="50"></label>
    <label>Length: <input id="col" type="number" value="10" min="1" max="50"></label>
    <button id="generate" class="button">Generate</button>
    
    </div>
  <table>
    <!-- Start + End-->
    <div class="controls">
    <label>StartRow: <input id="startrow" type="number" value="5" min="1" max="50"></label>
    <label>StartCol: <input id="startcol" type="number" value="2" min="1" max="50"></label>
    </div>
    <div class="controls">
    <label>EndRow: <input id="endrow" type="number" value="5" min="1" max="50"></label>
    <label>EndCol: <input id="endcol" type="number" value="8" min="1" max="50"></label>
    </div>

    <!-- Speed --> <!-- Density-->
  <div class="slidecontainer">
  <table>
    <tr>
      <th>Speed: <output id="speedVal" type="number" value="0" min="1"></output></th>
      <th><input type="range" min="1" max="500" value="100" class="slider" id="speed"></th>
    </tr>
  </table>
  <table>
      <tr>
        <th>Density:</th>
        <th><input type="range" min="0" max="100" value="30" class="slider" id="density"></th>
        <th><button id="ramdomize" class="button">Ramdomize walls</button></th>
      </tr>
    </table>
  </div>

  <div class="controls">
    <button id="start" class="button" >Start</button>
    <button id="stop" class="button">Stop/Resume</button>
    <button id="reset" class="button">Reset</button>
    </div>

    </div>
    <div id="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
